    <main>
        <h2>DATOS ACADEMICOS</h2>

        <table class="tabla-datos">

                <tr>
                    <th>PERIODO</th>
                    <th>NIVEL DE ESTUDIOS</th>
                    <th>TITULO</th>

        <h3>
            Solo teclee los datos del ultimo grado de estudios certificado
        </h3> <br><br>

        <form action="">

            <label for="Grado">Grado de estudios:</label>
            <input type="text" id="grado" name="grado"> <br><br>

            <label for="Escuela">Nombre de la escuela:</label>
            <input type="text" id="escuela" name="escuela"><br><br>
